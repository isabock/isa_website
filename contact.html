  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8; --text: #1a1a1a; --muted: #6b7280;
      --accent: #2d6a4f; --accent-light: #d8f3dc; --border: #e5e7eb;
      --card: #ffffff; --max-w: 780px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6; font-size: 16px;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      position: sticky; top: 0; background: rgba(250,250,248,0.95);
      backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); z-index: 100;
    }
    nav ul { display: flex; list-style: none; max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem; }
    nav a {
      display: block; padding: 1rem 1.1rem; color: var(--muted);
      text-decoration: none; font-size: 0.875rem; font-weight: 500;
      letter-spacing: 0.02em; transition: color 0.15s;
    }
    nav a:hover, nav a.active { color: var(--accent); }
    main { flex: 1; max-width: var(--max-w); width: 100%; margin: 0 auto; padding: 5rem 1.5rem; }
    h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { color: var(--muted); margin-bottom: 1.5rem; }
    .contact-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;
    }
    .contact-card {
      display: flex; align-items: center; gap: 0.85rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.25rem; text-decoration: none; color: var(--text);
      transition: border-color 0.15s, transform 0.1s;
    }
    .contact-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .contact-icon {
      width: 38px; height: 38px; border-radius: 8px; background: var(--accent-light);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .contact-icon svg { width: 18px; height: 18px; fill: var(--accent); }
    .contact-label { font-size: 0.75rem; color: var(--muted); }
    .contact-value { font-size: 0.875rem; font-weight: 500; }
    footer {
      text-align: center; padding: 2rem 1.5rem;
      font-size: 0.8rem; color: var(--muted); border-top: 1px solid var(--border);
    }
  </style>
</head>
